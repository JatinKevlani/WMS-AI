<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 780" width="100%" height="100%" style="background-color: #fafbfc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <defs>
        <!-- Soft shadow for use case ellipses -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.08"/>
        </filter>
        
        <!-- Open arrow marker for <<include>> and <<extend>> lines -->
        <marker id="arrow-include" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
            <polyline points="0,0 10,5 0,10" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
        </marker>
        
        <!-- Closed triangular marker for Actor inheritance -->
        <marker id="arrow-inherit" markerWidth="14" markerHeight="14" refX="14" refY="7" orient="auto">
            <polygon points="0,0 14,7 0,14" fill="#ffffff" stroke="#2c3e50" stroke-width="1.5"/>
        </marker>
    </defs>

    <!-- 1. System Boundary -->
    <rect x="180" y="30" width="540" height="710" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="15" ry="15"/>
    <text x="450" y="65" text-anchor="middle" font-size="20" font-weight="600" fill="#334155" letter-spacing="1">WMS-AI System</text>

    <!-- 2. Connection Lines (Actors to Use Cases) -->
    <!-- Staff Connections (Originates from Staff's hand at X=125, Y=210) -->
    <g stroke="#94a3b8" stroke-width="1.5">
        <line x1="125" y1="210" x2="235" y2="90"/>  <!-- Login -->
        <line x1="125" y1="210" x2="235" y2="170"/> <!-- View Dashboard -->
        <line x1="125" y1="210" x2="235" y2="250"/> <!-- Manage Products -->
        <line x1="125" y1="210" x2="235" y2="350"/> <!-- Record Sales -->
        <line x1="125" y1="210" x2="475" y2="210"/> <!-- View Analytics -->
        <line x1="125" y1="210" x2="475" y2="350"/> <!-- Stock In / Out -->
    </g>

    <!-- Admin Connections (Originates from Admin's hand at X=125, Y=530) -->
    <g stroke="#94a3b8" stroke-width="1.5">
        <line x1="125" y1="530" x2="235" y2="410"/> <!-- System Settings -->
        <line x1="125" y1="530" x2="235" y2="495"/> <!-- Create Purchase Orders -->
        <line x1="125" y1="530" x2="235" y2="570"/> <!-- Manage Alerts -->
        <line x1="125" y1="530" x2="235" y2="670"/> <!-- AI Recommendations -->
        <line x1="125" y1="530" x2="475" y2="410"/> <!-- Manage Users -->
        <line x1="125" y1="530" x2="475" y2="670"/> <!-- Export / Import Files -->
    </g>

    <!-- 3. Stereotype Relationships (Include / Extend) -->
    <g stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="6,4">
        <!-- Record Sales <<include>> Stock In / Out -->
        <line x1="405" y1="350" x2="475" y2="350" marker-end="url(#arrow-include)"/>
        
        <!-- Create Purchase Orders <<include>> Manage Suppliers -->
        <line x1="405" y1="495" x2="515" y2="495" marker-end="url(#arrow-include)"/>
        
        <!-- Get AI Tips <<extend>> Manage Alerts -->
        <line x1="515" y1="570" x2="405" y2="570" marker-end="url(#arrow-include)"/>
    </g>

    <g font-size="12" font-style="italic" font-weight="500" fill="#c0392b" text-anchor="middle">
        <text x="440" y="342">&lt;&lt;include&gt;&gt;</text>
        <text x="460" y="487">&lt;&lt;include&gt;&gt;</text>
        <text x="460" y="562">&lt;&lt;extend&gt;&gt;</text>
    </g>

    <!-- 4. Inheritance Line (Admin inherits from Staff) -->
    <!-- Line goes from top of Admin head (475) to bottom of Staff text (285) -->
    <line x1="100" y1="475" x2="100" y2="285" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow-inherit)"/>

    <!-- 5. Use Case Nodes (Ellipses) -->
    <g fill="#f8fafc" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)">
        <!-- Shared Use Cases -->
        <ellipse cx="320" cy="90" rx="85" ry="30"/>  <!-- U1 -->
        <ellipse cx="320" cy="170" rx="85" ry="30"/> <!-- U2 -->
        <ellipse cx="320" cy="250" rx="85" ry="30"/> <!-- U3 -->
        <ellipse cx="320" cy="350" rx="85" ry="30"/> <!-- U5 -->
        <ellipse cx="560" cy="210" rx="85" ry="30"/> <!-- U4 -->
        <ellipse cx="560" cy="350" rx="85" ry="30"/> <!-- U6 -->

        <!-- Admin-Only Use Cases -->
        <ellipse cx="320" cy="410" rx="85" ry="30"/> <!-- U7 -->
        <ellipse cx="560" cy="410" rx="85" ry="30"/> <!-- U8 -->
        <ellipse cx="320" cy="495" rx="85" ry="30"/> <!-- U9 -->
        <ellipse cx="600" cy="495" rx="85" ry="30"/> <!-- U10 -->
        <ellipse cx="320" cy="570" rx="85" ry="30"/> <!-- U11 -->
        <ellipse cx="600" cy="570" rx="85" ry="30"/> <!-- U12 -->
        <ellipse cx="320" cy="670" rx="85" ry="30"/> <!-- U13 -->
        <ellipse cx="560" cy="670" rx="85" ry="30"/> <!-- U14 -->
    </g>

    <!-- 6. Use Case Labels -->
    <g font-size="13" font-weight="500" fill="#1e293b" text-anchor="middle">
        <!-- Shared Text -->
        <text x="320" y="90" dy="4">Login</text>
        <text x="320" y="170" dy="4">View Dashboard</text>
        <text x="320" y="250" dy="4">Manage Products</text>
        <text x="320" y="350" dy="4">Record Sales</text>
        <text x="560" y="210" dy="4">View Analytics</text>
        <text x="560" y="350" dy="4">Stock In / Out</text>

        <!-- Admin Text -->
        <text x="320" y="410" dy="4">System Settings</text>
        <text x="560" y="410" dy="4">Manage Users</text>
        
        <!-- Multi-line text for Create Purchase Orders -->
        <text x="320" y="495">
            <tspan x="320" dy="-5">Create Purchase</tspan>
            <tspan x="320" dy="16">Orders</tspan>
        </text>
        
        <text x="600" y="495" dy="4">Manage Suppliers</text>
        <text x="320" y="570" dy="4">Manage Alerts</text>
        <text x="600" y="570" dy="4">Get AI Tips</text>
        <text x="320" y="670" dy="4">AI Recommendations</text>
        <text x="560" y="670" dy="4">Export / Import Files</text>
    </g>

    <!-- 7. Actors -->
    <!-- Staff Actor Group -->
    <g transform="translate(100, 200)">
        <circle cx="0" cy="-30" r="15" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
        <line x1="0" y1="-15" x2="0" y2="25" stroke="#334155" stroke-width="2"/> <!-- Body -->
        <line x1="0" y1="-5" x2="-25" y2="10" stroke="#334155" stroke-width="2"/> <!-- Left Arm -->
        <line x1="0" y1="-5" x2="25" y2="10" stroke="#334155" stroke-width="2"/>  <!-- Right Arm -->
        <line x1="0" y1="25" x2="-20" y2="60" stroke="#334155" stroke-width="2"/> <!-- Left Leg -->
        <line x1="0" y1="25" x2="20" y2="60" stroke="#334155" stroke-width="2"/>  <!-- Right Leg -->
        <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Staff</text>
    </g>

    <!-- Admin Actor Group -->
    <g transform="translate(100, 520)">
        <circle cx="0" cy="-30" r="15" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
        <line x1="0" y1="-15" x2="0" y2="25" stroke="#334155" stroke-width="2"/> <!-- Body -->
        <line x1="0" y1="-5" x2="-25" y2="10" stroke="#334155" stroke-width="2"/> <!-- Left Arm -->
        <line x1="0" y1="-5" x2="25" y2="10" stroke="#334155" stroke-width="2"/>  <!-- Right Arm -->
        <line x1="0" y1="25" x2="-20" y2="60" stroke="#334155" stroke-width="2"/> <!-- Left Leg -->
        <line x1="0" y1="25" x2="20" y2="60" stroke="#334155" stroke-width="2"/>  <!-- Right Leg -->
        <text x="0" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#334155">Admin</text>
    </g>

</svg>