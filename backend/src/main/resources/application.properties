# ===========================
# WMS-AI Configuration
# ===========================

server.port=8080

# H2 Database (Development)
spring.datasource.url=jdbc:h2:file:./wms-data/wmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# JWT
app.jwt.secret=WmsAiSecretKeyForJWT256BitMinimumLengthRequiredHere2026!
app.jwt.expiration=28800000

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://wms-ai-eight.vercel.app

# Gmail SMTP (configure with real values)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:wmsai.alerts@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Claude AI API
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=claude-sonnet-4-20250514
anthropic.api.base-url=https://api.anthropic.com/v1

# Alert config
app.alert.admin.email=admin@wms.com
app.alert.default.overstock.days=30
app.alert.default.min.threshold=50

# File paths
app.files.base.path=./wms-data

# Logging
logging.file.name=./wms-data/logs/wms_system.log
logging.level.com.wmsai=DEBUG
