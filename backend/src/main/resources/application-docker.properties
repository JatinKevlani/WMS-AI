# ===========================
# WMS-AI Docker Profile
# ===========================
# Activated via: --spring.profiles.active=docker

server.port=8080

# PostgreSQL Database (Docker)
spring.datasource.url=jdbc:postgresql://db:5432/${POSTGRES_DB:wmsai}
spring.datasource.username=${POSTGRES_USER:wmsai}
spring.datasource.password=${POSTGRES_PASSWORD:wmsai_secret}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true
spring.h2.console.enabled=false

# JWT
app.jwt.secret=${JWT_SECRET:WmsAiSecretKeyForJWT256BitMinimumLengthRequiredHere2026!}
app.jwt.expiration=28800000

# CORS — allow Nginx frontend
app.cors.allowed-origins=http://localhost,http://localhost:80,http://frontend,http://frontend:80

# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:wmsai.alerts@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Claude AI API
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=claude-sonnet-4-20250514
anthropic.api.base-url=https://api.anthropic.com/v1

# Alert config
app.alert.admin.email=${ALERT_ADMIN_EMAIL:admin@wms.com}
app.alert.default.overstock.days=30
app.alert.default.min.threshold=50

# File paths
app.files.base.path=/app/wms-data

# Logging
logging.file.name=/app/wms-data/logs/wms_system.log
logging.level.com.wmsai=INFO
logging.level.root=WARN
